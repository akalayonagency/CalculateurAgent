<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>
:root{
  /* Akatsuki vibe: rouge feu + or + noir */
  --gold:#d4af37;
  --goldSoft:rgba(212,175,55,.28);
  --red:#ff2a2a;
  --redSoft:rgba(255,42,42,.20);
  --bg:rgba(0,0,0,.40);
  --bg2:rgba(0,0,0,.52);
  --border:rgba(212,175,55,.35);
  --white:#fff;
  --muted:rgba(255,255,255,.78);
  --shadow:rgba(0,0,0,.45);
}

.calc-akatsuki{
  max-width:520px;
  margin:auto;
  padding:16px;
  background:linear-gradient(180deg, rgba(255,42,42,.06), var(--bg));
  border:1px solid var(--border);
  border-radius:16px;
  color:var(--white);
  font-family:Arial,system-ui,sans-serif;
  box-shadow:0 12px 30px var(--shadow);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.calc-akatsuki h2{
  margin:0 0 6px;
  font-size:18px;
  font-weight:900;
  letter-spacing:.2px;
}

.calc-akatsuki p{
  margin:0 0 14px;
  font-size:13px;
  color:var(--muted);
}

.input{
  display:flex;
  align-items:center;
  gap:10px;
  padding:10px 12px;
  border:1px solid var(--border);
  border-radius:12px;
  margin-bottom:12px;
  background:rgba(0,0,0,.22);
}

.input input{
  flex:1;
  background:transparent;
  border:0;
  outline:none;
  color:var(--white);
  font-size:16px;
  font-weight:900;
}

.unit{
  color:var(--gold);
  font-weight:900;
  text-shadow:0 0 14px rgba(212,175,55,.35);
}

.buttons{
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  gap:10px;
  margin-bottom:14px;
}

button{
  padding:10px;
  border-radius:12px;
  border:1px solid var(--border);
  background:rgba(0,0,0,.32);
  color:var(--white);
  font-weight:900;
  cursor:pointer;
  transition:transform .08s ease, filter .15s ease, background .2s ease;
}

button:hover{ filter:brightness(1.05); }
button:active{ transform:scale(.99); }

button.active{
  background:linear-gradient(135deg, rgba(255,42,42,.95), rgba(212,175,55,.92));
  color:#0b0b0b;
  border:none;
  box-shadow:0 10px 22px rgba(255,42,42,.18);
}

.result{
  padding:14px;
  border-radius:14px;
  background:linear-gradient(180deg, rgba(0,0,0,.55), rgba(0,0,0,.40));
  border:1px solid var(--border);
}

.badge{
  display:inline-block;
  padding:6px 12px;
  border-radius:999px;
  background:linear-gradient(135deg, var(--redSoft), var(--goldSoft));
  border:1px solid rgba(212,175,55,.65);
  font-size:12px;
  font-weight:900;
  margin-bottom:8px;
}

.big{
  font-size:34px;
  font-weight:900;
  margin:6px 0;
  text-shadow:0 0 18px rgba(255,42,42,.18);
}

.small{
  font-size:13px;
  color:var(--muted);
}
</style>
</head>

<body>

<div class="calc-akatsuki">
  <h2>Calculateur Agent / Manager — Akatsuki Agency 🔴彡</h2>
  <p>Entre le total mensuel (💎) et ajuste selon la performance.</p>

  <div class="input">
    <input type="number" id="montant" placeholder="0" min="0">
    <span class="unit">💎</span>
  </div>

  <div class="buttons">
    <button id="bad">Mauvais mois</button>
    <button id="normal" class="active">Mois normal</button>
    <button id="good">Très bon mois</button>
  </div>

  <div class="result">
    <div class="badge" id="taux">Taux : 0%</div>
    <div class="big" id="gain">0</div>
    <div class="small" id="detail">Entre un montant pour calculer.</div>
  </div>
</div>

<script>
const nf = new Intl.NumberFormat("fr-FR");

const montant = document.getElementById("montant");
const gain = document.getElementById("gain");
const tauxEl = document.getElementById("taux");
const detail = document.getElementById("detail");

const bad = document.getElementById("bad");
const normal = document.getElementById("normal");
const good = document.getElementById("good");

let bonus = 1;

/* Palier identique à ton calculateur */
function getTaux(v){
  if(v >= 3000000) return 3;
  if(v >= 2000000) return 2.5;
  if(v >= 1000000) return 2;
  if(v > 0) return 1.5;
  return 0;
}

function calcul(){
  const v = Number(montant.value) || 0;
  const taux = getTaux(v);

  const base = Math.floor(v * taux / 100);
  const final = Math.floor(base * bonus);

  tauxEl.textContent = `Taux : ${String(taux).replace(".",",")}%`;
  gain.textContent = nf.format(final);

  if(bonus === 0.7){
    detail.textContent = "Mauvais mois : –30% appliqué.";
  } else if(bonus === 1.3){
    detail.textContent = "Très bon mois : +30% appliqué.";
  } else {
    detail.textContent = "Mois normal : aucun bonus ni malus.";
  }
}

montant.addEventListener("input", calcul);

bad.onclick = () => {
  bonus = 0.7;
  bad.classList.add("active");
  normal.classList.remove("active");
  good.classList.remove("active");
  calcul();
};

normal.onclick = () => {
  bonus = 1;
  normal.classList.add("active");
  bad.classList.remove("active");
  good.classList.remove("active");
  calcul();
};

good.onclick = () => {
  bonus = 1.3;
  good.classList.add("active");
  normal.classList.remove("active");
  bad.classList.remove("active");
  calcul();
};
</script>

</body>
</html>
